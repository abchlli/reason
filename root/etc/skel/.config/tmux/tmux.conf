# Prefix
unbind C-b
set-option -g prefix C-s
bind-key C-s send-prefix

# Options
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
set -g repeat-time 1000
set -g mouse off

# Panes
set -g pane-border-lines single
set -g pane-border-status off

# Status
set -g status-position bottom
set -g status-justify absolute-centre
set -g status-bg colour0
set -g status-fg colour1

# Sessions
set -g status-left ' #S'
set -g status-left-length 100
set -g status-left-style 'fg=color13'

# Windows
setw -g window-status-current-format '#I:#W '
setw -g window-status-current-style 'fg=colour10 bg=default bold'
setw -g window-status-style 'fg=color11'

# Date and time
set -g status-right '#(date +%%H:%%M) '
set -g status-right-length 0

# Mappings
unbind Left
unbind Right
unbind Up
unbind Down
unbind -n Left
unbind -n Right
unbind -n Up
unbind -n Down
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 4
bind -r J resize-pane -D 4
bind -r K resize-pane -U 4
bind -r L resize-pane -R 4
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1
bind "|" split-window -h
bind "\\" split-window -fh
bind "-" split-window -v
bind "_" split-window -fv
bind a previous-window
bind e next-window
bind b set-option status
bind x kill-window
bind space copy-mode
bind r source-file "~/.config/tmux/tmux.conf"
bind f run-shell "tmux neww ~/.config/tmux/sessionizer.sh"
bind d run-shell "~/.config/tmux/sidebar.sh"

# Helix copy-mode
setw -g mode-keys vi
set-option -g @mode 'normal'
set-option -g @current_keys ''
bind-key -T copy-mode-vi C-d { # C-d
  set-option -Fp @current_keys '#{@current_keys} C-d'
  if-shell -F '#{==:#{@current_keys}, C-d}' {
      send -X halfpage-down
      if -F '#{!=:#{@mode},extend}' "send -X begin-selection"
      set-option -up @current_keys
  } { if-shell -F '#{!=:#{m|r:^ C-d$,#{@current_keys}},1}' {
    set-option -up @current_keys
  }}
}
bind-key -T copy-mode-vi C-u { # C-u
  set-option -Fp @current_keys '#{@current_keys} C-u'
  if-shell -F '#{==:#{@current_keys}, C-u}' {
      send -X halfpage-up
      if -F '#{!=:#{@mode},extend}' "send -X begin-selection"
      set-option -up @current_keys
  } { if-shell -F '#{!=:#{m|r:^ C-u$,#{@current_keys}},1}' {
    set-option -up @current_keys
  }}
}
bind -T copy-mode-vi C-j { # C-j
  send -X clear-selection
  send -X scroll-down
}
bind -T copy-mode-vi C-k { # C-k
  send -X clear-selection
  send -X scroll-up
}
bind-key -T copy-mode-vi x { # x
    set-option -Fp @current_keys '#{@current_keys} x'
    if-shell -F '#{==:#{@current_keys}, x}' {
        %hidden copy_cursor_y_abs='#{e|-|:#{e|+|:#{history_size},#{copy_cursor_y}},#{scroll_position}}'
        %hidden selection_latest_y='#{?#{>:#{selection_start_y},#{selection_end_y}},#{selection_start_y},#{selection_end_y}}'
        %hidden selection_forward='#{&&:#{==:#{copy_cursor_x},#{selection_end_x}},#{==:#{E:copy_cursor_y_abs},#{E:selection_latest_y}}}'
        if -F '#{selection_present}' {
            send -X cursor-down
            send -X end-of-line
        } {
            send -X start-of-line
            send -X begin-selection
            send -X end-of-line
        }
        set-option -up @current_keys
    } { if-shell -F '#{!=:#{m|r:^ x$,#{@current_keys}},1}' {
        set-option -up @current_keys
    }}
}
bind-key -T copy-mode-vi X { # X
    set-option -Fp @current_keys '#{@current_keys} x'
    if-shell -F '#{==:#{@current_keys}, x}' {
        %hidden copy_cursor_y_abs='#{e|-|:#{e|+|:#{history_size},#{copy_cursor_y}},#{scroll_position}}'
        %hidden selection_latest_y='#{?#{>:#{selection_start_y},#{selection_end_y}},#{selection_start_y},#{selection_end_y}}'
        %hidden selection_forward='#{&&:#{==:#{copy_cursor_x},#{selection_end_x}},#{==:#{E:copy_cursor_y_abs},#{E:selection_latest_y}}}'
        if -F '#{selection_present}' {
            send -X cursor-down
            send -X end-of-line
        } {
            send -X start-of-line
            send -X begin-selection
            send -X end-of-line
        }
        set-option -up @current_keys
    } { if-shell -F '#{!=:#{m|r:^ x$,#{@current_keys}},1}' {
        set-option -up @current_keys
    }}
}
bind-key -T copy-mode-vi v { # v
  set-option -Fp @current_keys '#{@current_keys} v'
  if-shell -F '#{==:#{@current_keys}, v}' {
      if -F '#{!=:#{@mode},extend}' {
        set -p @mode 'extend'
      } {
        set -p @mode 'normal'
      }
      set-option -up @current_keys
  } { if-shell -F '#{!=:#{m|r:^ v$,#{@current_keys}},1}' {
    set-option -up @current_keys
  }}
}
bind-key -T copy-mode-vi y { # y
  set-option -Fp @current_keys '#{@current_keys} y'
  if-shell -F '#{==:#{@current_keys}, y}' {
      send -X copy-selection-and-cancel
      run -b "tmux show-buffer | /mnt/c/Windows/System32/clip.exe"
      set -up @mode
      set -up @current_keys
      set-option -up @current_keys
  } { if-shell -F '#{!=:#{m|r:^ y$,#{@current_keys}},1}' {
    set-option -up @current_keys
  }}
}
bind-key -T copy-mode-vi w { # w
  set-option -Fp @current_keys '#{@current_keys} w'
  if-shell -F '#{==:#{@current_keys}, w}' {
      if -F '#{!=:#{@mode},extend}' "send -X begin-selection"
      send -X next-word
      set-option -up @current_keys
  } { if-shell -F '#{!=:#{m|r:^ w$,#{@current_keys}},1}' {
    set-option -up @current_keys
  }}
}
bind-key -T copy-mode-vi b { # b
