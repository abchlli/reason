      if -F '#{!=:#{@mode},extend}' "send -X begin-selection"
      set-option -up @current_keys
  } { if-shell -F '#{==:#{@current_keys}, l}' {
      send -X cursor-right
      if -F '#{!=:#{@mode},extend}' "send -X begin-selection"
      set-option -up @current_keys
  } { if-shell -F '#{!=:#{m|r:^ g l$|^ l$,#{@current_keys}},1}' {
    set-option -up @current_keys
  }}}
}
