  set-option -Fp @current_keys '#{@current_keys} g'
  if-shell -F '#{==:#{@current_keys}, g g}' {
      send -X history-top
      if -F '#{!=:#{@mode},extend}' "send -X begin-selection"
      set-option -up @current_keys
  } { if-shell -F '#{!=:#{m|r:^ g$|^ g g$,#{@current_keys}},1}' {
